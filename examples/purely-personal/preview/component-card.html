<!doctype html>
<html><head><meta charset="utf-8"><title>PP — Content card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:#f7f7f8; font-family:var(--font-body); }
  .card { background:#fff; border:2px solid #0a0a0a; padding:20px 22px; }
  .eyebrow { font-family:var(--font-heading); font-weight:700; font-size:12px; letter-spacing:0.06em; text-transform:uppercase; color:#e90d41; }
  h4 { font-family:var(--font-heading); font-weight:700; font-size:22px; letter-spacing:-0.02em; margin:6px 0 10px; color:#0a0a0a; line-height:1.15; }
  p { margin:0 0 8px 0; font-size:13.5px; line-height:1.5; color:#0a0a0a; }
  .prompt { font-style:italic; color:#e90d41; font-size:13px; line-height:1.45; }
  .footer { margin-top:10px; background:#e90d41; color:#fff; font-family:var(--font-heading); font-weight:700; font-size:11px; letter-spacing:0.04em; text-transform:uppercase; padding:6px 10px; display:inline-block; }
</style></head><body>
  <div class="card">
    <div class="eyebrow">Step 3 · Build Your 5 Content Pillars</div>
    <h4>Connect your calendar to actual business outcomes</h4>
    <p><strong>Go to:</strong> Claude · <strong>Paste this prompt:</strong></p>
    <p class="prompt">"Build 5 content pillars for my 90-day calendar. My expertise: [what you're best at]."</p>
    <div class="footer">What Claude delivers: 5 pillars · 30 topic ideas</div>
  </div>
</body></html>
