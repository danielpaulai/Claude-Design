<!doctype html>
<html><head><meta charset="utf-8"><title>PP — Neutral scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: #fafafa; font-family: var(--font-body); }
  .row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
  .sw { border: 1px solid var(--border-hairline); }
  .chip { aspect-ratio: 1/1; }
  .meta { padding: 8px 10px; background: #fff; border-top: 1px solid var(--border-hairline); }
  .name { font-family: var(--font-heading); font-weight: 600; font-size: 12px; color: var(--fg-1); }
  .hex { font-family: ui-monospace, Menlo, monospace; font-size: 10px; color: var(--fg-2); margin-top: 2px; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#ffffff;border:1px solid #e8eaec"></div><div class="meta"><div class="name">white</div><div class="hex">#ffffff</div></div></div>
    <div class="sw"><div class="chip" style="background:#f7f7f8"></div><div class="meta"><div class="name">off-white</div><div class="hex">#f7f7f8</div></div></div>
    <div class="sw"><div class="chip" style="background:#e8eaec"></div><div class="meta"><div class="name">gray-100</div><div class="hex">#e8eaec</div></div></div>
    <div class="sw"><div class="chip" style="background:#b8bec1"></div><div class="meta"><div class="name">gray-300</div><div class="hex">#b8bec1</div></div></div>
    <div class="sw"><div class="chip" style="background:#6b7075"></div><div class="meta"><div class="name">gray-500</div><div class="hex">#6b7075</div></div></div>
    <div class="sw"><div class="chip" style="background:#3a3d40"></div><div class="meta"><div class="name">gray-700</div><div class="hex">#3a3d40</div></div></div>
  </div>
</body></html>
