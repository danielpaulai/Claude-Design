<!doctype html>
<html><head><meta charset="utf-8"><title>PP — Semantic roles</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: #fafafa; font-family: var(--font-body); display:flex; flex-direction:column; gap:8px; }
  .row { display:flex; align-items:center; gap: 12px; padding: 10px 14px; background:#fff; border:1px solid var(--border-hairline); }
  .dot { width: 22px; height: 22px; border: 1px solid rgba(0,0,0,0.08); flex:none; }
  .label { font-family: var(--font-heading); font-weight:700; font-size:13px; letter-spacing:-0.01em; color:var(--fg-1); flex: 0 0 150px; }
  .desc  { font-family: var(--font-body); font-size:12px; color:var(--fg-2); }
  .hex   { margin-left:auto; font-family: ui-monospace, Menlo, monospace; font-size:11px; color:var(--fg-2); }
</style></head>
<body>
  <div class="row"><div class="dot" style="background:#0a0a0a"></div><div class="label">fg-1 / text</div><div class="desc">Body, headings</div><div class="hex">#0a0a0a</div></div>
  <div class="row"><div class="dot" style="background:#6b7075"></div><div class="label">fg-2 / muted</div><div class="desc">Meta, captions, secondary</div><div class="hex">#6b7075</div></div>
  <div class="row"><div class="dot" style="background:#b8bec1"></div><div class="label">fg-3 / subdued</div><div class="desc">Placeholder, disabled</div><div class="hex">#b8bec1</div></div>
  <div class="row"><div class="dot" style="background:#e90d41"></div><div class="label">accent</div><div class="desc">CTAs, highlight words, pills</div><div class="hex">#e90d41</div></div>
  <div class="row"><div class="dot" style="background:#f7f7f8"></div><div class="label">bg-canvas</div><div class="desc">Paper canvas</div><div class="hex">#f7f7f8</div></div>
  <div class="row"><div class="dot" style="background:#0a0a0a"></div><div class="label">bg-inverse</div><div class="desc">Dark hero / image-post</div><div class="hex">#0a0a0a</div></div>
</body></html>
