<!doctype html>
<html><head><meta charset="utf-8"><title>PP — Author byline</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body {
    margin:0; padding:24px; background:#fff;
    font-family: var(--font-body);
    display:flex; flex-direction:column; gap:14px;
  }
  .byline {
    display:flex; align-items:center; gap:12px;
    padding:10px 14px;
    background:#fff;
    border:1px solid var(--border-hairline);
    border-radius:999px;
    width:fit-content;
  }
  .byline.dark {
    background:#0a0a0a; color:#fff;
    border-color: rgba(255,255,255,0.1);
  }
  .avatar {
    width: 44px; height: 44px; border-radius: 999px;
    background: url('../assets/daniel-paul-headshot.jpg') center 16% / 180% auto no-repeat, #0a0a0a;
    flex: 0 0 auto;
    box-shadow: 0 0 0 2px #fff, 0 0 0 4px #e90d41;
  }
  .byline.dark .avatar {
    box-shadow: 0 0 0 2px #0a0a0a, 0 0 0 4px #e90d41;
  }
  .name {
    font-family: var(--font-heading); font-weight:700; font-size:15px;
    color:inherit; display:flex; align-items:center; gap:6px;
  }
  .sub {
    font-family: var(--font-body); font-size:12px;
    color:inherit; opacity:.7;
  }
  .verify {
    width:14px; height:14px; background:#2563eb; border-radius:999px;
    display:inline-flex; align-items:center; justify-content:center;
    color:#fff; font-size:9px; font-weight:900;
  }
</style></head><body>
  <div class="byline">
    <div class="avatar"></div>
    <div>
      <div class="name">Daniel Paul <span class="verify">✓</span></div>
      <div class="sub">Building powerful personal brands for CEOs &amp; Founders using AI</div>
    </div>
  </div>
  <div class="byline dark">
    <div class="avatar"></div>
    <div>
      <div class="name">Daniel Paul <span class="verify">✓</span></div>
      <div class="sub">On image posts · dark variant</div>
    </div>
  </div>
</body></html>
