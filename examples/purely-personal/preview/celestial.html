<!doctype html>
<html><head><meta charset="utf-8">
<title>PP — Cosmic distances</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; padding:0; background:#050505; color:#fff;
               font-family:'Rethink Sans', sans-serif; }
  #stage-host { width:100vw; height:100vh; }
</style>
</head>
<body>
<div id="stage-host"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="animations.jsx"></script>

<script type="text/babel">
const { useMemo } = React;
const RED = "#e90d41";
const INK = "#050505";
const PAPER = "#f7f7f8";

// Ease helpers from the starter
const { Stage, Sprite, useTime, interpolate, Easing } = window;

// Scene timeline (seconds)
//   0–7:   Earth vs Moon distance
//   7–14:  Sun is bigger than you think
//   14–21: Light from the sun
//   21–28: Jupiter could eat 1,321 Earths
//   28–35: Nearest star is 4.24 light years
//   35–42: We are a pale blue dot
const SCENES = [
  { start: 0,  end: 7,  key: "moon"     },
  { start: 7,  end: 14, key: "sun"      },
  { start: 14, end: 21, key: "light"    },
  { start: 21, end: 28, key: "jupiter"  },
  { start: 28, end: 35, key: "nearest"  },
  { start: 35, end: 42, key: "palepdot" },
];
const TOTAL = 42;

// ─── Shared primitives ───
function Starfield() {
  // Deterministic star positions
  const stars = useMemo(() => {
    const arr = [];
    for (let i = 0; i < 120; i++) {
      const seed = Math.sin(i * 912.37) * 10000;
      const x = (seed - Math.floor(seed));
      const y = (Math.sin(i * 543.21) * 10000);
      arr.push({
        x: x * 1920,
        y: (y - Math.floor(y)) * 1080,
        r: 0.4 + ((seed * 97) % 1) * 1.6,
        a: 0.35 + ((seed * 53) % 1) * 0.5,
      });
    }
    return arr;
  }, []);
  return (
    <svg width="1920" height="1080" style={{ position:"absolute", inset:0 }}>
      {stars.map((s, i) => (
        <circle key={i} cx={s.x} cy={s.y} r={s.r} fill="#fff" opacity={s.a}/>
      ))}
    </svg>
  );
}

function SceneLabel({ idx, total, title }) {
  return (
    <div style={{
      position:"absolute", top:40, left:60,
      display:"flex", alignItems:"center", gap:20,
      fontFamily:"Rethink Sans, sans-serif",
    }}>
      <div style={{ color: RED, fontWeight:800, letterSpacing:"0.2em", fontSize:14 }}>
        {String(idx).padStart(2,"0")} / {String(total).padStart(2,"0")}
      </div>
      <div style={{ width:60, height:2, background:RED }}/>
      <div style={{ color:"rgba(255,255,255,0.7)", fontWeight:700, fontSize:14, letterSpacing:"0.14em", textTransform:"uppercase" }}>
        {title}
      </div>
    </div>
  );
}

function FactCard({ t, sceneStart, headline, stat, statUnit, sub }) {
  const local = t - sceneStart;
  const fadeIn = interpolate(local, [0, 0.6], [0, 1], { easing: Easing.out });
  const ySlide = interpolate(local, [0, 0.8], [18, 0], { easing: Easing.out });
  const statIn = interpolate(local, [0.3, 1.2], [0, 1], { easing: Easing.out });

  return (
    <div style={{
      position:"absolute", right:80, bottom:80, width:780,
      opacity: fadeIn, transform: `translateY(${ySlide}px)`,
    }}>
      <div style={{
        fontFamily:"Rethink Sans, sans-serif", fontWeight:800,
        fontSize:54, lineHeight:1.05, letterSpacing:"-0.025em",
        color:"#fff", textWrap:"balance",
      }}>{headline}</div>
      <div style={{
        marginTop:28, display:"flex", alignItems:"baseline", gap:18,
        opacity: statIn, transform:`translateY(${(1-statIn)*12}px)`,
      }}>
        <div style={{
          fontFamily:"Rethink Sans, sans-serif", fontWeight:800,
          fontSize:110, lineHeight:0.9, letterSpacing:"-0.04em",
          backgroundImage:"linear-gradient(135deg, #ff2d5e 0%, #e90d41 55%, #a9082f 100%)",
          WebkitBackgroundClip:"text", backgroundClip:"text", color:"transparent",
        }}>{stat}</div>
        <div style={{
          fontFamily:"Rethink Sans, sans-serif", fontWeight:700, fontSize:28,
          color:RED, letterSpacing:"0.1em", textTransform:"uppercase",
        }}>{statUnit}</div>
      </div>
      <div style={{
        marginTop:18, fontFamily:"Inter, sans-serif", fontWeight:400,
        fontSize:22, color:"rgba(255,255,255,0.7)", lineHeight:1.5,
      }}>{sub}</div>
    </div>
  );
}

// Scene 1 — Earth & Moon, 30 Earths between
function MoonScene({ start }) {
  const t = useTime() - start;
  const p = Math.max(0, Math.min(1, t / 7));
  // Earth on left, Moon on right. 30 phantom earths along the gap for scale.
  const earthX = 220;
  const moonX = interpolate(p, [0, 0.4, 1], [earthX + 80, earthX + 80, 1500], { easing: Easing.inOut });
  return (
    <>
      <Starfield/>
      <SceneLabel idx={1} total={6} title="Earth · Moon"/>
      {/* Dotted guideline between */}
      <svg width="1920" height="1080" style={{ position:"absolute", inset:0 }}>
        <line x1={earthX} y1={540} x2={moonX} y2={540}
              stroke={RED} strokeWidth="1.5" strokeDasharray="4 8" opacity="0.5"/>
        {/* Tick marks representing 30 "Earth widths" */}
        {Array.from({ length: 30 }).map((_, i) => {
          const at = (i + 1) / 31;
          const x = earthX + (moonX - earthX) * at;
          const r = 3;
          const opacity = interpolate(p, [0.4, 0.9], [0, 0.6]);
          return <circle key={i} cx={x} cy={540} r={r} fill="#fff" opacity={opacity}/>;
        })}
        {/* Earth */}
        <circle cx={earthX} cy={540} r="120" fill={PAPER}/>
        <circle cx={earthX} cy={540} r="120" fill={RED} opacity="0.22"/>
        {/* Moon */}
        <circle cx={moonX} cy={540} r="32" fill="#d7d9db"/>
      </svg>
      <FactCard t={t} sceneStart={0}
        headline={<>The Moon is <em style={{color:RED, fontStyle:"normal"}}>30 Earths</em> away.</>}
        stat="384,400" statUnit="km"
        sub="Light takes 1.28 seconds to cross that gap. Every full moon you see is 1.28 seconds in the past."
      />
    </>
  );
}

// Scene 2 — Sun dwarfs Earth
function SunScene({ start }) {
  const t = useTime() - start;
  const p = Math.max(0, Math.min(1, t / 7));
  const sunR = interpolate(p, [0, 1], [40, 580], { easing: Easing.out });
  const sunOpacity = interpolate(p, [0, 0.5], [0, 1]);
  return (
    <>
      <Starfield/>
      <SceneLabel idx={2} total={6} title="Sun · diameter"/>
      <svg width="1920" height="1080" style={{ position:"absolute", inset:0 }}>
        {/* Sun halo */}
        <defs>
          <radialGradient id="sunglow">
            <stop offset="0%" stopColor="#ff2d5e" stopOpacity="1"/>
            <stop offset="60%" stopColor="#e90d41" stopOpacity="0.9"/>
            <stop offset="100%" stopColor="#a9082f" stopOpacity="0"/>
          </radialGradient>
        </defs>
        <circle cx="900" cy="540" r={sunR*1.15} fill="url(#sunglow)" opacity={sunOpacity*0.8}/>
        <circle cx="900" cy="540" r={sunR} fill={RED} opacity={sunOpacity}/>
        {/* Tiny Earth reference */}
        <circle cx="1700" cy="540" r="5" fill={PAPER}/>
        <text x="1700" y="580" fill="rgba(255,255,255,0.6)" fontSize="16"
              fontFamily="Inter, sans-serif" textAnchor="middle">← Earth</text>
      </svg>
      <FactCard t={t} sceneStart={0}
        headline={<>The Sun could swallow <em style={{color:RED, fontStyle:"normal"}}>1.3 million</em> Earths.</>}
        stat="1,392,700" statUnit="km wide"
        sub="Our star is 109 Earth diameters across. From here, it just looks like a coin."
      />
    </>
  );
}

// Scene 3 — Light from sun: 8 minutes 20 seconds
function LightScene({ start }) {
  const t = useTime() - start;
  const p = Math.max(0, Math.min(1, t / 7));
  // Photon traveling from sun to earth repeatedly
  const sunX = 180;
  const earthX = 1740;
  const loop = (t * 0.5) % 1;
  const photonX = sunX + (earthX - sunX) * loop;
  const trail = Math.max(0, photonX - 100);
  return (
    <>
      <Starfield/>
      <SceneLabel idx={3} total={6} title="Sun → Earth · light"/>
      <svg width="1920" height="1080" style={{ position:"absolute", inset:0 }}>
        <line x1={sunX} y1={540} x2={earthX} y2={540}
              stroke={RED} strokeWidth="1" strokeDasharray="2 6" opacity="0.35"/>
        {/* Sun */}
        <circle cx={sunX} cy={540} r="90" fill={RED}/>
        <circle cx={sunX} cy={540} r="140" fill={RED} opacity="0.18"/>
        {/* Earth */}
        <circle cx={earthX} cy={540} r="44" fill={PAPER}/>
        {/* Photon + trail */}
        <defs>
          <linearGradient id="photon-trail" x1="0%" x2="100%">
            <stop offset="0%" stopColor={RED} stopOpacity="0"/>
            <stop offset="100%" stopColor="#ff2d5e" stopOpacity="1"/>
          </linearGradient>
        </defs>
        <line x1={trail} y1={540} x2={photonX} y2={540}
              stroke="url(#photon-trail)" strokeWidth="4" strokeLinecap="round"/>
        <circle cx={photonX} cy={540} r="6" fill="#ffb3c4"/>
        <circle cx={photonX} cy={540} r="14" fill="#ff2d5e" opacity="0.4"/>
      </svg>
      <FactCard t={t} sceneStart={0}
        headline={<>Sunlight takes <em style={{color:RED, fontStyle:"normal"}}>8 min 20 sec</em> to reach you.</>}
        stat="150M" statUnit="km · 1 AU"
        sub="The sunlight warming your face right now left the Sun before you finished your last coffee."
      />
    </>
  );
}

// Scene 4 — Jupiter could eat 1,321 Earths
function JupiterScene({ start }) {
  const t = useTime() - start;
  const p = Math.max(0, Math.min(1, t / 7));
  // Jupiter in center, tiny Earths falling/orbiting
  const earthsVisible = Math.floor(interpolate(p, [0.2, 1], [0, 60]));
  return (
    <>
      <Starfield/>
      <SceneLabel idx={4} total={6} title="Jupiter · volume"/>
      <svg width="1920" height="1080" style={{ position:"absolute", inset:0 }}>
        {/* Jupiter */}
        <defs>
          <radialGradient id="jup">
            <stop offset="0%" stopColor="#5a5a5a"/>
            <stop offset="60%" stopColor="#2a2a2a"/>
            <stop offset="100%" stopColor="#0a0a0a"/>
          </radialGradient>
        </defs>
        <circle cx="720" cy="540" r="360" fill="url(#jup)"/>
        {/* Jupiter bands */}
        {[-0.7,-0.4,-0.15,0.1,0.35,0.6].map((y,i)=>(
          <ellipse key={i} cx="720" cy={540+y*340} rx={Math.sqrt(360*360 - (y*340)*(y*340))} ry="12" fill="#1a1a1a" opacity="0.6"/>
        ))}
        {/* Red spot */}
        <ellipse cx="840" cy="600" rx="54" ry="28" fill={RED} opacity="0.9"/>
        {/* Tiny Earths */}
        {Array.from({ length: earthsVisible }).map((_, i) => {
          const seed = Math.sin(i * 931.12) * 10000;
          const x = 1200 + (seed - Math.floor(seed)) * 640;
          const ySeed = Math.sin(i * 411.23) * 10000;
          const y = 120 + (ySeed - Math.floor(ySeed)) * 840;
          return <circle key={i} cx={x} cy={y} r="3.5" fill={PAPER}/>;
        })}
      </svg>
      <FactCard t={t} sceneStart={0}
        headline={<>Jupiter could swallow <em style={{color:RED, fontStyle:"normal"}}>1,321 Earths</em>.</>}
        stat="139,820" statUnit="km wide"
        sub="Its Great Red Spot alone is bigger than our entire planet. And it has been spinning for 350+ years."
      />
    </>
  );
}

// Scene 5 — Nearest star
function NearestScene({ start }) {
  const t = useTime() - start;
  const p = Math.max(0, Math.min(1, t / 7));
  // Sun on left, Proxima on right. A year-ticker crawls across.
  const sunX = 220;
  const proxX = 1700;
  const cursor = interpolate(p, [0.1, 1], [sunX, proxX], { easing: Easing.inOut });
  const years = interpolate(p, [0.1, 1], [0, 4.24], { easing: Easing.inOut });
  return (
    <>
      <Starfield/>
      <SceneLabel idx={5} total={6} title="Nearest star"/>
      <svg width="1920" height="1080" style={{ position:"absolute", inset:0 }}>
        <line x1={sunX} y1={540} x2={proxX} y2={540}
              stroke={RED} strokeWidth="1" strokeDasharray="3 8" opacity="0.5"/>
        {/* Sun */}
        <circle cx={sunX} cy={540} r="42" fill={RED}/>
        <text x={sunX} y={620} fill="rgba(255,255,255,0.7)" fontSize="16"
              fontFamily="Inter, sans-serif" textAnchor="middle">Sol</text>
        {/* Proxima */}
        <circle cx={proxX} cy={540} r="20" fill="#ff8099"/>
        <circle cx={proxX} cy={540} r="40" fill={RED} opacity="0.25"/>
        <text x={proxX} y={600} fill="rgba(255,255,255,0.7)" fontSize="16"
              fontFamily="Inter, sans-serif" textAnchor="middle">Proxima</text>
        {/* Traveling cursor */}
        <line x1={cursor} y1={510} x2={cursor} y2={570} stroke="#fff" strokeWidth="2"/>
        <text x={cursor} y={495} fill="#fff" fontSize="18" fontWeight="700"
              fontFamily="Rethink Sans, sans-serif" textAnchor="middle">
          {years.toFixed(2)} ly
        </text>
      </svg>
      <FactCard t={t} sceneStart={0}
        headline={<>The nearest star is <em style={{color:RED, fontStyle:"normal"}}>4.24 light-years</em> away.</>}
        stat="40.2T" statUnit="km · Proxima Centauri"
        sub="Our fastest probe, Voyager 1, would need 73,000 years to get there. Space is mostly… space."
      />
    </>
  );
}

// Scene 6 — Pale blue dot
function PaleBlueScene({ start }) {
  const t = useTime() - start;
  const p = Math.max(0, Math.min(1, t / 7));
  const earthR = interpolate(p, [0, 1], [120, 2.2], { easing: Easing.inOut });
  const scrim = interpolate(p, [0.5, 1], [0, 0.4]);
  return (
    <>
      <Starfield/>
      <SceneLabel idx={6} total={6} title="Pale blue dot"/>
      <svg width="1920" height="1080" style={{ position:"absolute", inset:0 }}>
        {/* Voyager perspective beams (soft rays) */}
        <defs>
          <linearGradient id="ray" x1="0%" x2="100%">
            <stop offset="0%" stopColor={RED} stopOpacity="0"/>
            <stop offset="100%" stopColor={RED} stopOpacity="0.4"/>
          </linearGradient>
        </defs>
        <rect x="0" y="0" width="1920" height="1080" fill="url(#ray)" opacity={scrim}/>
        {/* Earth shrinking in the sunbeam */}
        <circle cx="960" cy="540" r={earthR} fill={PAPER}/>
        <circle cx="960" cy="540" r={earthR*2.6} fill={PAPER} opacity="0.08"/>
      </svg>
      <FactCard t={t} sceneStart={0}
        headline={<>From Voyager 1, Earth is a <em style={{color:RED, fontStyle:"normal"}}>single pixel</em>.</>}
        stat="6.05B" statUnit="km from home"
        sub="Every war, every love, every cup of coffee you'll ever have. All of it, one speck in a sunbeam."
      />
    </>
  );
}

function Scenes() {
  const t = useTime();
  const loop = t % TOTAL;
  const scene = SCENES.find(s => loop >= s.start && loop < s.end) || SCENES[0];
  const key = scene.key;
  return (
    <>
      <div style={{ position:"absolute", inset:0, background: INK }}/>
      {key === "moon"     && <MoonScene     start={scene.start}/>}
      {key === "sun"      && <SunScene      start={scene.start}/>}
      {key === "light"    && <LightScene    start={scene.start}/>}
      {key === "jupiter"  && <JupiterScene  start={scene.start}/>}
      {key === "nearest"  && <NearestScene  start={scene.start}/>}
      {key === "palepdot" && <PaleBlueScene start={scene.start}/>}

      {/* Scene progress dots */}
      <div style={{
        position:"absolute", bottom:40, left:60,
        display:"flex", gap:10,
      }}>
        {SCENES.map((s, i) => {
          const active = (loop >= s.start && loop < s.end);
          return (
            <div key={i} style={{
              width: active ? 36 : 8, height:8, borderRadius:4,
              background: active ? RED : "rgba(255,255,255,0.25)",
              transition:"width .3s ease",
            }}/>
          );
        })}
      </div>

      {/* Master watermark */}
      <div style={{
        position:"absolute", bottom:40, right:60,
        fontFamily:"Rethink Sans, sans-serif", fontWeight:800,
        fontSize:14, letterSpacing:"0.28em", textTransform:"uppercase",
        color:"rgba(255,255,255,0.35)",
      }}>Purely · Personal</div>
    </>
  );
}

function App() {
  return (
    <Stage width={1920} height={1080} duration={TOTAL} loop autoplay>
      <Sprite start={0} end={TOTAL}>
        <Scenes/>
      </Sprite>
    </Stage>
  );
}

ReactDOM.createRoot(document.getElementById("stage-host")).render(<App/>);
</script>
</body></html>
