<!doctype html>
<html><head><meta charset="utf-8"><title>PP — Pastel category tints</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: #fafafa; font-family: var(--font-body); }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .cell { border: 2px solid #0a0a0a; padding: 22px 14px 14px; position: relative; min-height: 120px; }
  .pill { position: absolute; top: -14px; left: 50%; transform: translateX(-50%);
          padding: 6px 14px; border-radius: 999px; color: #fff;
          font-family: var(--font-heading); font-weight: 700; font-size: 12px; letter-spacing: 0.02em; }
  .hex  { position:absolute; bottom:8px; right:10px; font-family: ui-monospace, Menlo, monospace; font-size: 10px; color: #3a3d40; }
  .name { font-family: var(--font-heading); font-weight:700; font-size:16px; color:#0a0a0a; margin-top:6px; }
</style></head>
<body>
  <div class="row">
    <div class="cell" style="background:#e6f4ea"><div class="pill" style="background:#16a34a">Foundations</div><div class="name">Mint</div><div class="hex">#e6f4ea</div></div>
    <div class="cell" style="background:#ffe9d6"><div class="pill" style="background:#ea580c">Skills</div><div class="name">Peach</div><div class="hex">#ffe9d6</div></div>
    <div class="cell" style="background:#ffe1e8"><div class="pill" style="background:#e90d41">News</div><div class="name">Pink</div><div class="hex">#ffe1e8</div></div>
    <div class="cell" style="background:#e4ebfa"><div class="pill" style="background:#2563eb">LinkedIn</div><div class="name">Lavender</div><div class="hex">#e4ebfa</div></div>
  </div>
</body></html>
