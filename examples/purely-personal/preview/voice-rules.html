<!doctype html>
<html><head><meta charset="utf-8"><title>PP — Voice rules</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px; background:#fff; font-family:var(--font-body); }
  h5 { font-family:var(--font-heading); font-weight:700; font-size:13px; letter-spacing:0.04em; text-transform:uppercase; color:#0a0a0a; margin:0 0 10px; }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .col { border:2px solid #0a0a0a; padding:14px 16px; }
  .col.bad { border-color:#e90d41; }
  .tag { font-family:var(--font-heading); font-weight:700; font-size:11px; letter-spacing:0.06em; text-transform:uppercase; padding:2px 8px; border-radius:999px; background:#0a0a0a; color:#fff; }
  .tag.bad { background:#e90d41; }
  p { font-size:13.5px; line-height:1.5; margin:8px 0 0; color:#0a0a0a; }
</style></head><body>
  <div class="grid">
    <div class="col">
      <span class="tag">Do</span>
      <p>You spend 15 hours a week on LinkedIn.</p>
      <p>But you're still not getting results.</p>
      <p>I got it down to 2 hours using Claude.</p>
    </div>
    <div class="col bad">
      <span class="tag bad">Don't</span>
      <p>Unlock next-level LinkedIn ROI with our 10x growth-hacking stack 🚀 — the secret sauce top founders use. #AI</p>
    </div>
  </div>
</body></html>
