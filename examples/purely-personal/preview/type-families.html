<!doctype html>
<html><head><meta charset="utf-8"><title>PP — Type: Family specimens</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#fff; display:grid; grid-template-columns:1fr 1fr; gap:24px; }
  .card { border:2px solid #0a0a0a; padding:18px 20px; }
  .tag { font-family: ui-monospace, Menlo, monospace; font-size:11px; color:var(--fg-2); }
  .ab  { font-weight:700; letter-spacing:-0.02em; font-size:52px; line-height:1; color:var(--fg-1); margin-top:8px; }
  .meta { font-family: var(--font-body); font-size:12px; color:var(--fg-2); margin-top:10px; }
  .sample { font-size:15px; line-height:1.5; margin-top:4px; color:var(--fg-1); }
</style></head><body>
  <div class="card" style="font-family:var(--font-heading)">
    <div class="tag">heading · Rethink Sans</div>
    <div class="ab">Aa Bb 01</div>
    <div class="meta">400 / 500 / 600 / 700 / 800</div>
    <div class="sample" style="font-weight:700">Big typography, tight tracking.</div>
  </div>
  <div class="card" style="font-family:var(--font-body)">
    <div class="tag">body · Inter</div>
    <div class="ab">Aa Bb 01</div>
    <div class="meta">400 / 500 / 600 / 700</div>
    <div class="sample">One sentence per paragraph. Plain English.</div>
  </div>
</body></html>
