<!doctype html>
<html><head><meta charset="utf-8"><title>PP — Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#fff; font-family:var(--font-body); display:flex; gap:20px; align-items:flex-end; }
  .cell { text-align:center; }
  .sq { width:80px; height:80px; background:#0a0a0a; }
  .name { font-family:var(--font-heading); font-weight:700; font-size:12px; color:#0a0a0a; margin-top:8px; }
  .val  { font-family: ui-monospace, Menlo, monospace; font-size:11px; color:var(--fg-2); margin-top:2px; }
  .pill { width:120px; height:40px; background:#e90d41; color:#fff; display:flex; align-items:center; justify-content:center;
          font-family:var(--font-heading); font-weight:700; font-size:13px; letter-spacing:0.02em; border-radius:999px; }
</style></head><body>
  <div class="cell"><div class="sq" style="border-radius:0"></div><div class="name">none</div><div class="val">0px</div></div>
  <div class="cell"><div class="sq" style="border-radius:4px"></div><div class="name">sm</div><div class="val">4px</div></div>
  <div class="cell"><div class="sq" style="border-radius:8px"></div><div class="name">md</div><div class="val">8px</div></div>
  <div class="cell"><div class="sq" style="border-radius:16px"></div><div class="name">lg</div><div class="val">16px</div></div>
  <div class="cell"><div class="pill">Repost</div><div class="name">pill</div><div class="val">999px</div></div>
</body></html>
