<!doctype html>
<html><head><meta charset="utf-8"><title>PP — Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background:#fff; display:grid; grid-template-columns:1fr 1fr; gap:18px; }
  .cell { border:1px solid var(--border-hairline); padding:18px; display:flex; align-items:center; justify-content:center; min-height:130px; }
  .cell.dark { background:#0a0a0a; }
  img { max-width:96px; max-height:110px; display:block; }
</style></head><body>
  <div class="cell"><img src="../assets/purely-personal-logo.png" alt="Purely Personal logo"></div>
  <div class="cell dark"><img src="../assets/purely-personal-logo.png" alt="Purely Personal logo on dark" style="filter:drop-shadow(0 0 0 #fff)"></div>
</body></html>
