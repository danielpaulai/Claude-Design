<!doctype html>
<html><head><meta charset="utf-8"><title>PP — Pills & eyebrows</title>
<link rel="stylesheet" href="../colors_and_type.css">

  <div class="pill" style="background:#16a34a">Foundations</div>

  <div style="width:100%;height:8px"></div>
  <span class="eyebrow">STEP 01</span>
  <span class="eyebrow eyered">STEP 01</span>
