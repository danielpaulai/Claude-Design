<!doctype html>
<html><head><meta charset="utf-8"><title>PP — Palette: Brand</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: #fafafa; font-family: var(--font-body); }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .sw { border: 1px solid var(--border-hairline); }
  .chip { aspect-ratio: 16/9; }
  .meta { padding: 10px 12px; background: #fff; border-top: 1px solid var(--border-hairline); }
  .name { font-family: var(--font-heading); font-weight: 700; font-size: 14px; letter-spacing: -0.01em; color: var(--fg-1); }
  .hex { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px; color: var(--fg-2); margin-top: 2px; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#e90d41"></div><div class="meta"><div class="name">Red</div><div class="hex">#e90d41</div></div></div>
    <div class="sw"><div class="chip" style="background:#0a0a0a"></div><div class="meta"><div class="name">Near Black</div><div class="hex">#0a0a0a</div></div></div>
    <div class="sw"><div class="chip" style="background:#b8bec1"></div><div class="meta"><div class="name">Silver</div><div class="hex">#b8bec1</div></div></div>
    <div class="sw"><div class="chip" style="background:#f7f7f8;border:1px solid #e8eaec"></div><div class="meta"><div class="name">Off-white</div><div class="hex">#f7f7f8</div></div></div>
    <div class="sw"><div class="chip" style="background:#ffffff;border:1px solid #e8eaec"></div><div class="meta"><div class="name">White</div><div class="hex">#ffffff</div></div></div>
  </div>
</body></html>
