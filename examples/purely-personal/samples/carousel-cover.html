<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Purely Personal — Carousel Cover Sample</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Rethink+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-red: #e90d41;
      --color-near-black: #0a0a0a;
      --color-silver: #b8bec1;
      --color-white: #ffffff;
      --color-off-white: #f7f7f8;
      --color-gray-500: #6b7075;
      --font-heading: 'Rethink Sans', 'Inter', system-ui, sans-serif;
      --font-body: 'Inter', system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
      min-height: 100vh;
    }
    .canvas {
      width: 1080px;
      height: 1350px;
      background: var(--color-off-white);
      position: relative;
      box-shadow: 0 12px 48px rgba(0,0,0,0.3);
      transform-origin: top center;
    }
    @media (max-width: 1180px) {
      .canvas { transform: scale(0.6); }
    }
    .frame {
      position: absolute;
      inset: 80px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .eyebrow {
      display: inline-block;
      background: var(--color-red);
      color: var(--color-white);
      padding: 8px 20px;
      border-radius: 9999px;
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      align-self: flex-start;
    }
    .hero {
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 108px;
      line-height: 1.02;
      letter-spacing: -0.025em;
      color: var(--color-near-black);
      margin: 32px 0 0 0;
    }
    .hero .accent { color: var(--color-red); }
    .footer {
      display: flex;
      align-items: center;
      gap: 20px;
      padding-top: 32px;
      border-top: 3px solid var(--color-near-black);
    }
    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 9999px;
      background: var(--color-near-black);
      flex-shrink: 0;
    }
    .byline {
      font-family: var(--font-body);
      font-size: 22px;
      color: var(--color-near-black);
      font-weight: 600;
      line-height: 1.25;
    }
    .byline .role {
      color: var(--color-gray-500);
      font-weight: 400;
      font-size: 18px;
    }
    .repost {
      margin-left: auto;
      background: var(--color-near-black);
      color: var(--color-white);
      padding: 14px 24px;
      border-radius: 9999px;
      font-family: var(--font-heading);
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="frame">
      <div>
        <span class="eyebrow">Cover · 1 of 7</span>
        <h1 class="hero">You spend 15 hours<br>a week on LinkedIn.<br><span class="accent">Down to 2.</span></h1>
      </div>
      <div class="footer">
        <div class="avatar"></div>
        <div class="byline">
          Daniel Paul<br>
          <span class="role">Founder, Purely Personal</span>
        </div>
        <div class="repost">↻ Repost</div>
      </div>
    </div>
  </div>
</body>
</html>
