<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Brand In A Box — OG Image (1200×630)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&family=Rethink+Sans:wght@500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-red: #e90d41;
      --color-near-black: #0a0a0a;
      --color-silver: #b8bec1;
      --color-white: #ffffff;
      --color-off-white: #f7f7f8;
      --color-gray-500: #6b7075;
      --font-heading: 'Rethink Sans', sans-serif;
      --font-body: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 40px;
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: var(--font-body);
    }
    /* Render mode: at exactly 1200px viewport, strip the preview frame so the canvas is the whole body. */
    @media (max-width: 1280px) {
      body { padding: 0; background: var(--color-off-white); min-height: auto; }
      .canvas { box-shadow: none; }
    }
    .canvas {
      width: 1200px;
      height: 630px;
      background: var(--color-off-white);
      position: relative;
      box-shadow: 0 12px 48px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }
    .frame {
      position: absolute;
      inset: 64px 80px;
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 64px;
      align-items: stretch;
    }
    .left { display: flex; flex-direction: column; justify-content: center; gap: 24px; }
    .top { display: flex; flex-direction: column; gap: 20px; }
    .eyebrow {
      display: inline-block;
      align-self: flex-start;
      background: var(--color-red);
      color: var(--color-white);
      padding: 7px 16px;
      border-radius: 9999px;
      font-family: var(--font-mono);
      font-weight: 500;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .hero {
      font-family: var(--font-heading);
      font-weight: 800;
      font-size: 92px;
      line-height: 0.96;
      letter-spacing: -0.035em;
      color: var(--color-near-black);
      margin: 0;
    }
    .hero .accent { color: var(--color-red); }
    .lede {
      font-family: var(--font-body);
      font-weight: 400;
      font-size: 22px;
      line-height: 1.45;
      color: var(--color-gray-500);
      margin: 0;
      max-width: 580px;
    }
    .footer {
      display: flex;
      align-items: center;
      gap: 20px;
      padding-top: 24px;
      border-top: 2px solid var(--color-near-black);
    }
    .badge {
      font-family: var(--font-mono);
      font-weight: 500;
      font-size: 14px;
      color: var(--color-near-black);
      letter-spacing: 0.06em;
    }
    .badge .dot { color: var(--color-red); margin: 0 8px; }
    .right {
      background: var(--color-near-black);
      border-radius: 12px;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      color: var(--color-white);
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.5;
      position: relative;
      overflow: hidden;
    }
    .right::before {
      content: '';
      position: absolute;
      top: 16px; right: 16px;
      width: 12px; height: 12px;
      border-radius: 9999px;
      background: var(--color-red);
      box-shadow:
        -20px 0 0 #fbbf24,
        -40px 0 0 #34d399;
    }
    .right .label {
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--color-silver);
      margin-bottom: 4px;
    }
    .right .row { color: #f5f5f7; }
    .right .row.indent { padding-left: 16px; color: #98989d; }
    .right .key { color: #00d4ff; }
    .right .str { color: #fbbf24; }
    .right .punc { color: #6e6e73; }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="frame">
      <div class="left">
        <div class="top">
          <span class="eyebrow">// CLAUDE-DESIGN</span>
          <h1 class="hero">Brand <span class="accent">in a box.</span></h1>
          <p class="lede">10 questions. 1 prompt. A complete brand design system in Claude. In 90 seconds.</p>
        </div>
      </div>
      <div class="right">
        <div class="label">Generated output</div>
        <div class="row"><span class="punc">{</span></div>
        <div class="row indent"><span class="key">"brand"</span><span class="punc">:</span> <span class="str">"yours"</span><span class="punc">,</span></div>
        <div class="row indent"><span class="key">"voice"</span><span class="punc">:</span> <span class="str">"extracted"</span><span class="punc">,</span></div>
        <div class="row indent"><span class="key">"colors"</span><span class="punc">:</span> <span class="str">"on-brand"</span><span class="punc">,</span></div>
        <div class="row indent"><span class="key">"design.md"</span><span class="punc">:</span> <span class="str">"ready"</span><span class="punc">,</span></div>
        <div class="row indent"><span class="key">"skill.md"</span><span class="punc">:</span> <span class="str">"installed"</span><span class="punc">,</span></div>
        <div class="row indent"><span class="key">"time"</span><span class="punc">:</span> <span class="str">"90 seconds"</span></div>
        <div class="row"><span class="punc">}</span></div>
      </div>
    </div>
  </div>
</body>
</html>
